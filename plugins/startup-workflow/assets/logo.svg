  <text x="156" y="432" fill="#E2E8F0" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Stages</text>
  <text x="156" y="490" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="24">1. Opportunity framing</text>
  <text x="156" y="536" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="24">2. User research plan</text>
  <text x="156" y="582" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="24">3. Evidence review</text>
  <text x="156" y="628" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="24">4. AI fit review</text>
  <text x="156" y="674" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="24">5. Market and risk review</text>
  <rect x="518" y="372" width="954" height="352" rx="36" fill="#0F172A" fill-opacity="0.24"/>
  <text x="566" y="432" fill="#E2E8F0" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Workflow promise</text>
  <text x="566" y="500" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="700">Move from rough idea to</text>
  <text x="566" y="558" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="700">reviewable MVP scope</text>
  <text x="566" y="632" fill="#BFDBFE" font-family="Helvetica, Arial, sans-serif" font-size="28">Every stage ends with go, revise, or stop.</text>
