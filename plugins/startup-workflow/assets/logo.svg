  <text x="332" y="198" fill="#E2E8F0" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="800">Startup Workflow</text>
  <text x="332" y="268" fill="#BFDBFE" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="500">Gated 0-1 product initiation for AI agents</text>
